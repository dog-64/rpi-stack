---
- name: Проверка подключения к Raspberry Pi кластеру
  hosts: active
  gather_facts: yes

  tasks:
    - name: Ping всех хостов
      ping:

    - name: Показать информацию о системе
      debug:
        msg: |
          Хост: {{ inventory_hostname }}
          IP: {{ ansible_host }}
          Модель: {{ model }}
          Память: {{ memory }}
          OS: {{ ansible_distribution }} {{ ansible_distribution_version }}
          Архитектура: {{ ansible_architecture }}
          Ядро: {{ ansible_kernel }}
