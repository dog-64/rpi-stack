---
- name: Проверить архитектуру
  ansible.builtin.set_fact:
    node_exporter_arch: "{{ 'linux-amd64' if ansible_architecture == 'x86_64' else 'linux-arm64' }}"

- name: Проверить установлен ли Node Exporter
  ansible.builtin.stat:
    path: /usr/local/bin/node_exporter
  register: node_exporter_binary
  tags:
    - node-exporter
    - node-exporter-check

- name: Показать статус установки
  ansible.builtin.debug:
    msg: "Node Exporter уже установлен"
  when: node_exporter_binary.stat.exists
  tags:
    - node-exporter
    - node-exporter-check

- name: Создать временный каталог
  ansible.builtin.file:
    path: /tmp/node_exporter_install
    state: directory
    mode: '0755'
  when: not node_exporter_binary.stat.exists | default(false)
  tags:
    - node-exporter

- name: Скачать Node Exporter
  ansible.builtin.get_url:
    url: "https://github.com/prometheus/node_exporter/releases/download/v{{ node_exporter_version }}/node_exporter-{{ node_exporter_version }}.{{ node_exporter_arch }}.tar.gz"
    dest: /tmp/node_exporter_install/node_exporter.tar.gz
    mode: '0644'
    timeout: 60
  when: not node_exporter_binary.stat.exists | default(false)
  tags:
    - node-exporter

- name: Распаковать Node Exporter
  ansible.builtin.unarchive:
    src: /tmp/node_exporter_install/node_exporter.tar.gz
    dest: /tmp/node_exporter_install
    remote_src: true
  when: not node_exporter_binary.stat.exists | default(false)
  tags:
    - node-exporter

- name: Установить бинарник
  ansible.builtin.copy:
    src: "/tmp/node_exporter_install/node_exporter-{{ node_exporter_version }}.{{ node_exporter_arch }}/node_exporter"
    dest: /usr/local/bin/node_exporter
    mode: '0755'
    remote_src: true
  when: not node_exporter_binary.stat.exists | default(false)
  tags:
    - node-exporter

- name: Создать systemd service
  ansible.builtin.copy:
    content: |
      [Unit]
      Description=Node Exporter
      After=network.target

      [Service]
      Type=simple
      User={{ node_exporter_user }}
      ExecStart=/usr/local/bin/node_exporter
      Restart=always
      RestartSec=5

      [Install]
      WantedBy=multi-user.target
    dest: /etc/systemd/system/node_exporter.service
    mode: '0644'
  tags:
    - node-exporter

- name: Перезагрузить systemd
  ansible.builtin.systemd:
    daemon_reload: true
  tags:
    - node-exporter

- name: Запустить Node Exporter
  ansible.builtin.systemd:
    name: node_exporter
    state: started
    enabled: true
  tags:
    - node-exporter

- name: Очистить временные файлы
  ansible.builtin.file:
    path: /tmp/node_exporter_install
    state: absent
  tags:
    - node-exporter

- name: Проверить что Node Exporter запущен
  ansible.builtin.systemd:
    name: node_exporter
  register: node_exporter_status
  tags:
    - node-exporter
    - node-exporter-check

- name: Проверить что порт 9100 открыт
  ansible.builtin.wait_for:
    port: "{{ node_exporter_port }}"
    host: "{{ ansible_default_ipv4.address }}"
    timeout: 30
  tags:
    - node-exporter
    - node-exporter-check

- name: Информация о Node Exporter
  ansible.builtin.debug:
    msg:
      - "=========================================="
      - "Node Exporter установлен!"
      - "Хост: {{ inventory_hostname }}"
      - "IP: {{ ansible_default_ipv4.address }}"
      - "URL: http://{{ ansible_default_ipv4.address }}:9100/metrics"
      - "=========================================="
  tags:
    - node-exporter
    - node-exporter-check
