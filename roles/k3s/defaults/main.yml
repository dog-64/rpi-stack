---
k3s_version: latest
k3s_channel: stable

k3s_server_ip: "{{ hostvars[groups['k3s_server'][0]]['ansible_host'] | default(ansible_host) }}"
k3s_api_port: 6443
k3s_url: "https://{{ k3s_server_ip }}:{{ k3s_api_port }}"

k3s_token: ""

k3s_server_args: ""
k3s_agent_args: ""

k3s_write_kubeconfig_mode: "644"
k3s_tls_san: "{{ k3s_server_ip }}"
k3s_advertise_address: "{{ k3s_server_ip }}"
k3s_bind_address: "{{ k3s_server_ip }}"

k3s_disable_items: []
k3s_cluster_cidr: "10.42.0.0/16"
k3s_service_cidr: "10.43.0.0/16"

k3s_cluster_init: false
k3s_server_extra_args: ""
k3s_agent_extra_args: ""

k3s_auto_reboot_cgroups: true

# Time synchronization - enable systemd-timesyncd and wait for sync before starting k3s
k3s_ensure_time_sync: true
k3s_time_sync_timeout: 60  # seconds to wait for time sync
