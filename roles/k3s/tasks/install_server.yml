---
- name: Get k3s node token from server
  ansible.builtin.slurp:
    src: /var/lib/rancher/k3s/server/node-token
  register: k3s_node_token
  delegate_to: "{{ groups['k3s_server'][0] }}"
  run_once: true
  become: true
  when: k3s_token == ""

- name: Set k3s token fact
  ansible.builtin.set_fact:
    k3s_token_value: "{{ k3s_token if k3s_token != '' else k3s_node_token.content | b64decode | trim }}"
  when: k3s_token != "" or k3s_node_token is defined

- name: Build server install command
  ansible.builtin.set_fact:
    k3s_install_env: >-
      INSTALL_K3S_EXEC='server'
      K3S_NODE_NAME='{{ inventory_hostname }}'
      {{ 'K3S_TOKEN=' + k3s_token_value if k3s_cluster_init else '' }}
    k3s_server_flags: >-
      --write-kubeconfig-mode {{ k3s_write_kubeconfig_mode }}
      --tls-san {{ k3s_tls_san }}
      --advertise-address {{ k3s_advertise_address }}
      --bind-address {{ k3s_bind_address }}
      --cluster-cidr {{ k3s_cluster_cidr }}
      --service-cidr {{ k3s_service_cidr }}
      {{ k3s_server_args }}
      {{ k3s_server_extra_args }}
      {{ '--cluster-init' if k3s_cluster_init else '' }}
      {{ k3s_disable_items | map('regex_replace', '^', '--disable ') | join(' ') if k3s_disable_items else '' }}

- name: Display install command (debug)
  ansible.builtin.debug:
    msg: "Installing k3s server with: {{ k3s_install_env }} {{ k3s_server_flags }}"
    verbosity: 1

- name: Install k3s server
  ansible.builtin.shell: |
    curl -sfL https://get.k3s.io | \
    {{ k3s_install_env }} sh -s - {{ k3s_server_flags }}
  args:
    creates: /usr/local/bin/k3s
  environment:
    INSTALL_K3S_CHANNEL: "{{ k3s_channel }}"
  become: true
  register: k3s_server_install
  async: 600
  poll: 10

- name: Wait for k3s server to be ready
  ansible.builtin.wait_for:
    host: "{{ k3s_server_ip }}"
    port: "{{ k3s_api_port }}"
    timeout: 300
  when: k3s_server_install.changed

- name: Wait for k3s node to be ready
  ansible.builtin.shell: k3s kubectl get nodes {{ inventory_hostname }} -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}'
  register: k3s_node_ready
  until: k3s_node_ready.stdout == "True"
  retries: 30
  delay: 10
  changed_when: false
  become: true
  when: k3s_server_install.changed
