---
- name: Get k3s version
  ansible.builtin.command: k3s --version
  register: k3s_version_output
  changed_when: false
  become: true

- name: Display k3s version
  ansible.builtin.debug:
    msg: "{{ k3s_version_output.stdout_lines }}"

- name: Check k3s service status (server)
  ansible.builtin.systemd:
    name: k3s
  register: k3s_service
  become: true
  when: k3s_role == 'server'

- name: Check k3s service status (agent)
  ansible.builtin.systemd:
    name: k3s-agent
  register: k3s_agent_service
  become: true
  when: k3s_role == 'agent'

- name: Display service status
  ansible.builtin.debug:
    msg: "k3s {{ k3s_role }} service: {{ (k3s_service_status | default(k3s_agent_service_status | default({}))).get('status', {}).get('ActiveState', 'unknown') }}"

- name: Get cluster nodes (server only)
  ansible.builtin.command: k3s kubectl get nodes -o wide
  register: k3s_nodes
  changed_when: false
  become: true
  delegate_to: "{{ groups['k3s_server'][0] }}"
  run_once: true
  when: k3s_role == 'server'

- name: Display cluster nodes
  ansible.builtin.debug:
    msg: "{{ k3s_nodes.stdout_lines }}"
  when: k3s_role == 'server'

- name: Get cluster pods (server only)
  ansible.builtin.command: k3s kubectl get pods -A
  register: k3s_pods
  changed_when: false
  become: true
  delegate_to: "{{ groups['k3s_server'][0] }}"
  run_once: true
  when: k3s_role == 'server'

- name: Display cluster pods
  ansible.builtin.debug:
    msg: "{{ k3s_pods.stdout_lines }}"
  when: k3s_role == 'server'
