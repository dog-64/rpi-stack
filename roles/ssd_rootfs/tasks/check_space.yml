---
# Check available space on SSD

- name: Get current root usage in GB
  ansible.builtin.shell: df -h / | tail -1 | awk '{print $3}' | sed 's/G//'
  changed_when: false
  register: root_usage_output

- name: Set root usage fact
  ansible.builtin.set_fact:
    root_usage_gb: "{{ root_usage_output.stdout | float }}"

- name: Check if SSD partition exists
  ansible.builtin.stat:
    path: "/dev/{{ ssd_partition }}"
  register: ssd_partition_stat

- name: Get SSD partition size in GB (existing partition)
  ansible.builtin.shell: lsblk /dev/{{ ssd_partition }} -o SIZE -n -d | sed 's/G//g' | sed 's/,/./'
  changed_when: false
  register: ssd_size_output
  when:
    - ssd_partition_stat.stat.exists

- name: Get SSD disk size in GB (for new partition)
  ansible.builtin.shell: lsblk /dev/{{ ssd_device }} -o SIZE -n -d | sed 's/G//g' | sed 's/,/./'
  changed_when: false
  register: ssd_disk_size_output
  when:
    - not ssd_partition_stat.stat.exists

- name: Set SSD size fact (existing partition)
  ansible.builtin.set_fact:
    ssd_size_gb: "{{ ssd_size_output.stdout | float }}"
  when:
    - ssd_partition_stat.stat.exists

- name: Set SSD size fact (disk for new partition)
  ansible.builtin.set_fact:
    ssd_size_gb: "{{ ssd_disk_size_output.stdout | float }}"
  when:
    - not ssd_partition_stat.stat.exists

- name: Check if SSD has enough space
  ansible.builtin.assert:
    that:
      - (ssd_size_gb | float) >= (root_usage_gb | float * ssd_min_free_space_ratio | float)
    fail_msg: "Недостаточно места на SSD. Требуется: {{ root_usage_gb | float * ssd_min_free_space_ratio | round(2) }}GB, доступно: {{ ssd_size_gb }}GB"
    quiet: true
  tags:
    - check

- name: Display space information
  ansible.builtin.debug:
    msg:
      - "Текущее использование root: {{ root_usage_gb }}GB"
      - "Размер SSD {{ 'раздела' if ssd_partition_stat.stat.exists else 'диска' }}: {{ ssd_size_gb }}GB"
      - "Достаточно места: {{ (ssd_size_gb | float) >= (root_usage_gb | float * ssd_min_free_space_ratio | float) }}"
  tags:
    - check
