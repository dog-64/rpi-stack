---
- name: Базовая настройка Raspberry Pi кластера
  hosts: active
  become: yes

  handlers:
    - name: Restart avahi
      systemd:
        name: avahi-daemon
        state: restarted

  tasks:
    - name: Обновить список пакетов
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Разблокировать dpkg если заблокирован
      shell: |
        if [ -f /var/lib/dpkg/lock-frontend ]; then
          pid=$(fuser /var/lib/dpkg/lock-frontend 2>/dev/null | grep -o '[0-9]*' | head -1)
          if [ -n "$pid" ]; then
            kill $pid 2>/dev/null || true
            sleep 1
          fi
        fi
        rm -f /var/lib/dpkg/lock-frontend /var/lib/dpkg/lock /var/cache/apt/archives/lock
      changed_when: false
      failed_when: false

    - name: Установить основные пакеты
      apt:
        name:
          - vim
          - htop
          - git
          - curl
          - wget
          - net-tools
          - iotop
          - iftop
          - rsync
          - screen
          - mc
          - tmux
          - python3-pip
        state: present

    - name: Настроить hostname
      hostname:
        name: "{{ hostname }}"

    - name: Добавить hostname в /etc/hosts
      lineinfile:
        path: /etc/hosts
        line: "127.0.1.1 {{ hostname }}"
        state: present

    - name: Создать файл со списком хостов кластера
      blockinfile:
        path: /etc/hosts
        block: |
          # Raspberry Pi Cluster
          10.0.1.104  p104 leha
          10.0.1.33   p33  sema
          10.0.1.56   p56  motya
          10.0.1.75   p75  osya
        marker: "# {mark} ANSIBLE MANAGED BLOCK - PI CLUSTER"

    - name: Настроить timezone
      timezone:
        name: Europe/Moscow

    - name: Настроить локаль ru_RU.UTF-8
      lineinfile:
        path: /etc/locale.gen
        regexp: '^# ru_RU\.UTF-8 UTF-8'
        line: 'ru_RU.UTF-8 UTF-8'
        state: present

    - name: Раскомментировать en_US.UTF-8 в /etc/locale.gen
      lineinfile:
        path: /etc/locale.gen
        regexp: '^# en_US\.UTF-8 UTF-8'
        line: 'en_US.UTF-8 UTF-8'
        state: present

    - name: Сгенерировать локали
      command: locale-gen
      changed_when: false

    - name: Настроить локаль по умолчанию
      command: update-locale LANG=ru_RU.UTF-8
      changed_when: false

    - name: Настроить /etc/default/locale
      copy:
        dest: /etc/default/locale
        content: |
          LANG=ru_RU.UTF-8
          LANGUAGE=ru
          LC_CTYPE=ru_RU.UTF-8
          LC_NUMERIC=ru_RU.UTF-8
          LC_TIME=ru_RU.UTF-8
          LC_COLLATE=ru_RU.UTF-8
          LC_MONETARY=ru_RU.UTF-8
          LC_MESSAGES=ru_RU.UTF-8
          LC_PAPER=ru_RU.UTF-8
          LC_NAME=ru_RU.UTF-8
          LC_ADDRESS=ru_RU.UTF-8
          LC_TELEPHONE=ru_RU.UTF-8
          LC_MEASUREMENT=ru_RU.UTF-8
          LC_IDENTIFICATION=ru_RU.UTF-8
        mode: '0644'

    - name: Включить автоматические обновления безопасности
      apt:
        name: unattended-upgrades
        state: present

    - name: Создать директорию для скриптов
      file:
        path: /opt/cluster-scripts
        state: directory
        mode: '0755'

    - name: Настроить лимиты для системы
      sysctl:
        name: "{{ item.key }}"
        value: "{{ item.value }}"
        state: present
        reload: yes
      loop:
        - { key: 'vm.swappiness', value: '10' }
        - { key: 'fs.file-max', value: '65535' }

    - name: Включить публикацию workstation в Avahi (mDNS)
      lineinfile:
        path: /etc/avahi/avahi-daemon.conf
        regexp: '^publish-workstation='
        line: 'publish-workstation=yes'
        state: present
      notify: Restart avahi

    - name: Убедиться что avahi-daemon запущен
      systemd:
        name: avahi-daemon
        state: started
        enabled: yes

    - name: Отключить rpi-eeprom-update для быстрой загрузки (Pi 4)
      systemd:
        name: rpi-eeprom-update.service
        enabled: no
        masked: yes
      when: ansible_board_name is defined and 'Raspberry Pi 4' in ansible_board_name

    - name: Перезагрузить хосты для применения всех настроек
      reboot:
        reboot_timeout: 600
        connect_timeout: 15
        test_command: whoami
