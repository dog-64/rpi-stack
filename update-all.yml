---
- name: Обновление всех хостов кластера
  hosts: active
  become: yes
  serial: 1  # Обновляем по одному хосту за раз

  tasks:
    - name: Обновить список пакетов
      apt:
        update_cache: yes

    - name: Обновить все пакеты
      apt:
        upgrade: dist
        autoremove: yes
        autoclean: yes

    - name: Проверить, требуется ли перезагрузка
      stat:
        path: /var/run/reboot-required
      register: reboot_required

    - name: Уведомить о необходимости перезагрузки
      debug:
        msg: "⚠️  Хост {{ inventory_hostname }} требует перезагрузки!"
      when: reboot_required.stat.exists

    - name: Перезагрузить хост (опционально, закомментировано)
      # reboot:
      #   reboot_timeout: 300
      # when: reboot_required.stat.exists
      debug:
        msg: "Для перезагрузки раскомментируйте задачу выше"
      when: reboot_required.stat.exists
